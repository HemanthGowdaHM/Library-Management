<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Error — College Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0d1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(90px); opacity: 0.18;
      animation: float 10s ease-in-out infinite;
    }
    .orb-1 { width: 400px; height: 400px; background: #2563eb; top: -80px; left: -80px; }
    .orb-2 { width: 300px; height: 300px; background: #e5a032; bottom: -60px; right: -60px; animation-delay: 5s; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

    .container {
      text-align: center; padding: 48px 32px;
      position: relative; z-index: 1;
      max-width: 520px; width: 100%;
    }

    .gear-wrap { margin-bottom: 16px; }
    .gear { font-size: 60px; display: inline-block; animation: spin 4s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .error-code {
      font-family: 'Playfair Display', serif;
      font-size: 120px; font-weight: 700; line-height: 1;
      color: transparent;
      background: linear-gradient(135deg, #4a90d9, #2563eb, #4a90d9);
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: shimmer 3s linear infinite; margin-bottom: 8px;
    }
    @keyframes shimmer { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }

    h1 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 12px; }

    .subtitle { color: rgba(255,255,255,0.45); font-size: 15px; line-height: 1.7; margin-bottom: 32px; }

    .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 24px; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
      text-decoration: none; border: 1.5px solid transparent; transition: all 0.2s;
    }
    .btn-gold { background: linear-gradient(135deg,#e5a032,#c8841a); color:#fff; }
    .btn-gold:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(229,160,50,0.4); }
    .btn-ghost { background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.7); border-color:rgba(255,255,255,0.12); }
    .btn-ghost:hover { background:rgba(255,255,255,0.1); color:#fff; }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="container">
    <div class="gear-wrap"><span class="gear">⚙️</span></div>
    <div class="error-code">500</div>
    <h1>Something Went Wrong</h1>
    <p class="subtitle">
      Our library system ran into an unexpected problem.<br>
      The admin has been notified. Please try again in a moment.
    </p>
    <div class="actions">
      <a href="/" class="btn btn-gold">🏠 Go Home</a>
      <a href="javascript:location.reload()" class="btn btn-ghost">↻ Try Again</a>
    </div>
  </div>
</body>
</html>
