{% extends 'base.html' %}
{% block title %}Delete Room{% endblock %}

{% block content %}
<div class="page">
  <h1>Delete Room</h1>
  <p>Are you sure you want to delete the room "{{ room.name }}"? This action cannot be undone.</p>
  <form method="post">
    {% csrf_token %}
    <button class="btn btn-danger">Yes, delete room</button>
    <a href="{% url 'social:study_room_detail' room.pk %}" class="btn btn-outline">Cancel</a>
  </form>
</div>
{% endblock %}
