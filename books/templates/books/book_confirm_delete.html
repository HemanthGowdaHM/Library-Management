{% extends 'base.html' %}

{% block content %}

<div class="card p-4 shadow-sm">
    <h4>Are you sure you want to delete this book?</h4>

    <p><strong>{{ object.title }}</strong></p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">
            Confirm Delete
        </button>
        <a href="{% url 'books:book_list' %}"
           class="btn btn-secondary">
            Cancel
        </a>
    </form>
</div>

{% endblock %}
